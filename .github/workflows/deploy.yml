name: Deploy genaievent to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './genaievent/package-lock.json'

      - name: Install dependencies and build React app
        working-directory: ./genaievent
        env:
          CI: false # Prevents warnings from breaking the build
          REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          PUBLIC_URL: /wildcard # Relative paths injection for routing
        run: |
          npm ci
          npm run build

      # --- PHYSICAL WILDCARD SUBDIRECTORY INJECTION ---
      - name: Force Physical Subdirectory for GitHub Pages
        run: |
          # 1. Build directory ke andar wildcard folder create karo
          mkdir -p ./genaievent/build/wildcard
          
          # 2. Static directory chunks ko nested folder me copy karo
          cp -r ./genaievent/build/static ./genaievent/build/wildcard/ 2>/dev/null || true
          
          # 3. Baaki root files (index.html, assets, logos) ko wildcard ke andar copy karo
          find ./genaievent/build -maxdepth 1 -type f -exec cp {} ./genaievent/build/wildcard/ \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './genaievent/build' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4