name: Deploy genaievent to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './genaievent/package-lock.json'

      - name: Install dependencies and build React app
        working-directory: ./genaievent
        env:
          CI: false # Prevents warnings from breaking the build
          REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
        run: |
          npm ci
          npm run build

      # --- STRUCTURAL FIX FOR WILDCARD ROUTING ---
      - name: Structure for Wildcard Subdirectory
        run: |
          mkdir -p ./genaievent/build/wildcard
          cp -r ./genaievent/build/static ./genaievent/build/wildcard/
          cp ./genaievent/build/index.html ./genaievent/build/wildcard/
          cp ./genaievent/build/manifest.json ./genaievent/build/wildcard/ || true
          cp ./genaievent/build/favicon.ico ./genaievent/build/wildcard/ || true
          
          # Baaki images aur assets ko bhi wildcard folder me move karne ke liye
          find ./genaievent/build -maxdepth 1 -type f -exec cp {} ./genaievent/build/wildcard/ \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './genaievent/build' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4