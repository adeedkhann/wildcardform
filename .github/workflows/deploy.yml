name: Deploy genaievent to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './genaievent/package-lock.json'

      - name: Install dependencies and build React app
        working-directory: ./genaievent
        env:
          CI: false 
          REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          PUBLIC_URL: /wildcard
        run: |
          npm ci
          npm run build

      # --- FIXED WILDCARD COPY LOGIC ---
      - name: Force Physical Subdirectory for GitHub Pages
        run: |
          # 1. Pehle pure build ka backup ek temporary folder me le lo
          mkdir -p ./genaievent/temp_build
          cp -r ./genaievent/build/* ./genaievent/temp_build/
          
          # 2. Ab main build folder ko poora saaf karo
          rm -rf ./genaievent/build/*
          
          # 3. Build ke andar wildcard folder banao aur backup data usme daal do
          mkdir -p ./genaievent/build/wildcard
          cp -r ./genaievent/temp_build/* ./genaievent/build/wildcard/
          
          # 4. Cleanup temporary directory
          rm -rf ./genaievent/temp_build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './genaievent/build' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4